<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Petri Dish Survivor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Petri Dish Survivor</h1>
      <div class="meta">
        <span id="status">Loading…</span>
        <button id="restart">Restart</button>
      </div>
    </div>

    <div class="card">
      <canvas id="game" width="960" height="600"></canvas>
      <div class="hint">Move: WASD / Arrow Keys • Collect nutrients • Avoid bacteria</div>
      <div class="hint2">If SVGs don’t load, run a local server (see bottom of README)</div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
